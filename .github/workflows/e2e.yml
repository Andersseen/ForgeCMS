name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        # Workspace packages are consumed from dist/ (see packages/*/package.json exports).
        # The E2E dev server needs them built before it can resolve @forge-cms/* imports.
        run: pnpm exec turbo run build --filter=@forge-cms/www^...

      - name: Install Playwright browsers
        run: pnpm --filter @forge-cms/www exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm e2e:www
